<div class="main-container">
    <!-- Home Button -->
    <a routerLink="/" class="home-btn" title="Retour à l'accueil">
        <i class="bi bi-house-door"></i>
    </a>
    <!-- Blue Side -->
    <div class="left-pane">
        <div class="water-waves"></div>
        <div class="welcome-text">
            <div class="logo-circle">
                <img src="logo.png" alt="OTIC Logo" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h2>OTIC°</h2>
            <p>Accédez à la plateforme de gestion des sources thermales et de la qualité des eaux.</p>
        </div>
    </div>

    <!-- Form Side -->
    <div class="right-pane">
        <div class="form-card">
            <div class="form-header">
                <h3>Bon retour !</h3>
                <p>Veuillez vous connecter à votre compte.</p>
            </div>

            <form (ngSubmit)="login()">
                <!-- Identifier -->
                <div class="input-group-custom">
                    <input type="text" class="form-control" id="identifier" [(ngModel)]="credentials.identifier"
                        name="identifier" required placeholder="Email ou Téléphone">
                    <i class="bi bi-person"></i>
                </div>

                <!-- Password -->
                <div class="input-group-custom">
                    <input type="password" class="form-control" id="password" [(ngModel)]="credentials.password"
                        name="password" required placeholder="Mot de passe">
                    <i class="bi bi-lock"></i>
                </div>

                <div class="d-flex justify-content-end mb-4">
                    <a routerLink="/forgot-password" class="text-primary small text-decoration-none fw-bold">Mot de passe oublié ?</a>
                </div>

                <div *ngIf="error" class="alert alert-danger py-2 small border-0 bg-danger bg-opacity-10 text-danger mb-4" role="alert">
                    {{ error }}
                </div>

                <button type="submit" class="btn-submit">Se Connecter</button>

                <a routerLink="/register" class="register-link">
                    Pas encore de compte ? <span>Inscrivez-vous</span>
                </a>
            </form>
        </div>
    </div>
</div>
