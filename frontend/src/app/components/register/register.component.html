<div class="main-container">
    <!-- Home Button -->
    <a routerLink="/" class="home-btn" title="Retour à l'accueil">
        <i class="bi bi-house-door"></i>
    </a>
    
    <!-- Blue Sidebar -->
    <div class="left-pane">
        <div class="water-waves"></div>
        <div class="welcome-text">
            <div class="logo-circle">
                <img src="logo.png" alt="OTIC Logo" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h2>OTIC°</h2>
            <p>Rejoignez notre communauté et explorez nos services de gestion d'eau.</p>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="right-pane">
        <div class="form-card">
            <div class="form-header">
                <h3>Créer un compte</h3>
                <p class="text-muted small">Remplissez les informations ci-dessous pour commencer.</p>
            </div>

            <form (ngSubmit)="register()">
                <!-- Name Row -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Nom</label>
                        <input type="text" class="form-control" [(ngModel)]="user.nom" name="nom" required placeholder="Ex: Ben Ali">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Prénom</label>
                        <input type="text" class="form-control" [(ngModel)]="user.prenom" name="prenom" required placeholder="Ex: Mohamed">
                    </div>
                </div>

                <!-- Email, Phone & CIN -->
                <div class="row g-3 mb-3">
                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" class="form-control" [(ngModel)]="user.email" name="email" required placeholder="nom@exemple.com">
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Téléphone</label>
                        <input type="text" class="form-control" [(ngModel)]="user.telephone" name="telephone" required placeholder="+216 -- --- ---">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">N° CIN</label>
                        <input type="text" class="form-control" [(ngModel)]="user.cin" name="cin" required placeholder="Ex: 01234567">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label small fw-bold">Mot de passe</label>
                    <input type="password" class="form-control" [(ngModel)]="user.password" name="password" required placeholder="••••••••">
                </div>

                <!-- Region & Ville -->
                <div class="row g-2 mb-4">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Région</label>
                        <select class="form-select" [(ngModel)]="user.adresse.region" name="region" (change)="onRegionChange()" required>
                            <option value="" disabled selected>Choisir</option>
                            <option *ngFor="let gov of governorates" [value]="gov.governorate">{{ gov.governorate }}</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label small fw-bold">Ville</label>
                        <select class="form-select" [(ngModel)]="user.adresse.ville" name="ville" required [disabled]="!user.adresse.region" (change)="onVilleChange()">
                            <option value="" disabled selected>Choisir</option>
                            <option *ngFor="let del of delegations" [value]="del.name">{{ del.name }}</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Code P.</label>
                        <input type="text" class="form-control" [(ngModel)]="user.adresse.codePostal" name="codePostal" required readonly>
                    </div>
                </div>

                <div *ngIf="error" class="alert alert-danger py-2 small border-0 bg-danger bg-opacity-10 text-danger mb-3" role="alert">
                    {{ error }}
                </div>

                <button type="submit" class="btn-submit mb-4">S'inscrire</button>
                
                <div class="position-relative mb-4">
                    <hr class="text-muted opacity-25">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small fw-medium">OU AVEC</span>
                </div>

                <div class="row g-2">
                    <div class="col-4">
                        <button type="button" (click)="socialLogin('google')" class="btn btn-social w-100">
                            <i class="bi bi-google text-danger"></i>
                        </button>
                    </div>
                    <div class="col-4">
                        <button type="button" (click)="socialLogin('facebook')" class="btn btn-social w-100">
                            <i class="bi bi-facebook text-primary"></i>
                        </button>
                    </div>
                    <div class="col-4">
                        <button type="button" (click)="socialLogin('twitter')" class="btn btn-social w-100">
                            <i class="bi bi-twitter-x text-dark"></i>
                        </button>
                    </div>
                </div>

                <a routerLink="/login" class="login-link">
                    Déjà membre ? <span>Connectez-vous</span>
                </a>
            </form>
        </div>
    </div>
</div>
