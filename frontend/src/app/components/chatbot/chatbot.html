<div class="chatbot-container">
  <!-- Toggle Button -->
  <button class="chatbot-toggle" (click)="toggleChat()">
    <i class="bi" [ngClass]="isOpen ? 'bi-x-lg' : 'bi-robot'"></i>
  </button>

  <!-- Chat Window -->
  <div class="chatbot-window" *ngIf="isOpen">
    <div class="chatbot-header">
      <h3>Assistant OTIC</h3>
      <button class="close-btn" (click)="toggleChat()">×</button>
    </div>

    <div class="messages-container">
      <div *ngFor="let msg of messages" class="message" [ngClass]="msg.sender">
        {{ msg.text }}
      </div>
      <div *ngIf="isTyping" class="typing-indicator">
        L'assistant réfléchit...
      </div>
    </div>

    <div class="input-container">
      <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Tapez votre message..."
        [disabled]="isTyping">
      <button class="send-btn" (click)="sendMessage()" [disabled]="isTyping || !userInput.trim()">
        <i class="bi bi-send-fill"></i>
      </button>
    </div>
  </div>
</div>
